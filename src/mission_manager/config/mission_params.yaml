# Mission Manager configuration
# ─────────────────────────────
# Loaded by mission.launch.py → mission_manager_node

mission_manager_node:
  ros__parameters:

    # ── FSM timing ──────────────────────────────────────────────────
    fsm_tick_rate: 2.0          # Hz — how often the state machine evaluates
    goal_publish_rate: 1.0      # Hz — goal re-publish rate to /mission/goal
    health_check_rate: 0.5      # Hz — upstream node health monitoring

    # ── Flight parameters ───────────────────────────────────────────
    takeoff_altitude: 2.0       # metres — target takeoff altitude
    waypoint_threshold: 0.5     # metres — distance to consider waypoint reached
    frame_id: "map"             # TF frame for all goal poses

    # ── Return-to-launch position (local frame) ────────────────────
    rtl_x: 0.0
    rtl_y: 0.0

    # ── Health monitoring ───────────────────────────────────────────
    health_timeout: 5.0         # seconds — silence before declaring node dead

    # ── Default strategy (applied by /mission/load service) ────────
    strategy_name: "maze_navigation"
    strategy_params: '{"goal_x": 8.0, "goal_y": 8.0}'

# ── Package Delivery preset ────────────────────────────────────
# Used by delivery_sim.launch.py (overrides the defaults above):
#   strategy_name: "package_delivery"
#   strategy_params: '{"pickup_x": 2.0, "pickup_y": -1.0,
#                      "dropoff_x": 20.0, "dropoff_y": 18.0,
#                      "altitude": 3.0, "dwell_time": 3.0}'
